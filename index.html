<!DOCTYPE html>
<html>
<head>
    <title>Smart Navigation System</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background-color: #f5f5f5;
            margin-top: 50px;
        }

        h1 {
            color: #333;
        }

        button {
            padding: 15px 25px;
            font-size: 18px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        button:hover {
            background-color: #45a049;
        }

        #status {
            margin-top: 30px;
            font-size: 22px;
            color: blue;
        }

        #direction {
            margin-top: 20px;
            font-size: 24px;
            font-weight: bold;
            color: darkred;
        }
    </style>
</head>

<body>

    <h1>Smart Navigation System</h1>

    <button onclick="scanRFID()">Scan RFID</button>

    <div id="status"></div>
    <div id="direction"></div>

    <script>

        function speak(text) {
            let speech = new SpeechSynthesisUtterance(text);
            speech.lang = "en-US";
            window.speechSynthesis.speak(speech);
        }

        function scanRFID() {

            document.getElementById("status").innerText = "RFID Detected ✔";
            speak("RFID detected");

            // Step 1
            setTimeout(() => {
                let msg1 = "Go straight";
                document.getElementById("direction").innerText = msg1;
                speak(msg1);
            }, 1000);

            // Step 2
            setTimeout(() => {
                let msg2 = "Keep walking forward";
                document.getElementById("direction").innerText = msg2;
                speak(msg2);
            }, 3000);

            // Final Step
            setTimeout(() => {
                let msg3 = "Destination is on the left. Room 309";
                document.getElementById("direction").innerText = msg3;
                speak(msg3);
            }, 5000);
        }

    </script>

</body>
</html>
