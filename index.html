<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NavAssist Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: sans-serif;
            overflow: hidden;
        }

        .pulse-ring {
            position: absolute;
            width: 100px;
            height: 100px;
            border: 4px solid #3b82f6;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(4); opacity: 0; }
        }

        #setup-screen {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .rfid-btn {
            background: #1f2937;
            padding: 10px 15px;
            margin: 5px;
            border-radius: 10px;
        }
    </style>
</head>

<body class="flex flex-col items-center justify-center min-h-screen">

<!-- SETUP SCREEN -->
<div id="setup-screen">
    <h1 class="text-3xl font-bold mb-8 text-center px-6">NavAssist Setup</h1>
    <button id="activate-btn"
        class="bg-red-600 text-white font-extrabold py-8 px-12 rounded-full text-2xl shadow-2xl border-4 border-white">
        START SYSTEM
    </button>
</div>

<!-- RFID SIMULATION BUTTONS -->
<div class="absolute top-5 left-5 z-50">
    <button class="rfid-btn" onclick="updateLocation('lobby')">Lobby</button>
    <button class="rfid-btn" onclick="updateLocation('library')">Library</button>
    <button class="rfid-btn" onclick="updateLocation('cse')">CSE Lab</button>
    <button class="rfid-btn" onclick="updateLocation('canteen')">Canteen</button>
    <button class="rfid-btn" onclick="updateLocation('room309')">Room 309</button>
</div>

<!-- VISUAL FEEDBACK -->
<div id="visual-feedback" class="hidden pulse-ring"></div>

<!-- MAIN UI -->
<main class="z-10 text-center p-8">
    <div class="w-32 h-32 bg-gray-900 rounded-full flex items-center justify-center mx-auto border-4 border-blue-500 mb-10">
        <span id="status-icon" class="text-5xl">🎤</span>
    </div>

    <h1 class="text-5xl font-extrabold mb-4">NavAssist</h1>
    <p id="status-text" class="text-2xl text-blue-400">Tap Screen & Speak</p>
    <p id="loc-display" class="mt-4 text-gray-400">Location: Lobby</p>
</main>

<script>
    // ---------------- DATA ----------------
    const mapData = {
        'lobby': { name: 'Main Lobby', angle: 0 },
        'cse': { name: 'CSE Lab', angle: 270 },
        'library': { name: 'Library', angle: 90 },
        'canteen': { name: 'Canteen', angle: 180 },
        'room309': { name: 'Room 309', angle: 270 }, // LEFT
        'exit': { name: 'Main Exit', angle: 0 }
    };

    let currentPos = 'lobby';
    let userHeading = 0;

    const synth = window.speechSynthesis;

    function speak(text) {
        synth.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        synth.speak(msg);
    }

    // ---------------- RFID SIMULATION ----------------
    function updateLocation(newLoc) {
        if (mapData[newLoc]) {
            currentPos = newLoc;

            document.getElementById('loc-display').innerText =
                "Location: " + mapData[currentPos].name;

            speak(`Location updated to ${mapData[currentPos].name}`);
        }
    }

    // ---------------- COMPASS ----------------
    window.addEventListener('deviceorientationabsolute', (e) => {
        if (e.alpha !== null) {
            userHeading = e.alpha;
        }
    }, true);

    // ---------------- SPEECH RECOGNITION ----------------
    const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new Speech();
    recognition.lang = 'en-US';

    recognition.onstart = () => {
        document.getElementById('visual-feedback').classList.remove('hidden');
        document.getElementById('status-text').innerText = "Listening...";
    };

    recognition.onend = () => {
        document.getElementById('visual-feedback').classList.add('hidden');
        document.getElementById('status-text').innerText = "Tap Screen & Speak";
    };

    recognition.onresult = (event) => {
        const input = event.results[0][0].transcript.toLowerCase();
        let target = null;

        if (input.includes("where")) {
            speak(`You are at ${mapData[currentPos].name}`);
            return;
        }

        if (input.includes("cse")) target = 'cse';
        else if (input.includes("library")) target = 'library';
        else if (input.includes("canteen")) target = 'canteen';
        else if (input.includes("309") || input.includes("room")) target = 'room309';
        else if (input.includes("exit")) target = 'exit';

        if (target) {
            navigateTo(target);
        } else {
            speak("Please say a valid destination");
        }
    };

    // ---------------- NAVIGATION ----------------
    function navigateTo(target) {

    // SPECIAL: Room 309 guided flow
    if (target === 'room309') {

        // Step 1: Turn left
        speak("Turn left");

        // Step 2: Walk (after 2 seconds)
        setTimeout(() => {
            speak("Walk");
        }, 2000);

        // Step 3: Destination (after 5 seconds)
        setTimeout(() => {
            speak("Your destination is on the left");
        }, 5000);

        return;
    }

    // -------- NORMAL NAVIGATION --------
    let targetAngle = mapData[target].angle;
    let diff = (targetAngle - userHeading + 360) % 360;

    if (diff > 180) diff -= 360;

    if (Math.abs(diff) < 15) {
        speak(`Go straight to ${mapData[target].name}`);
    } else if (diff > 0) {
        speak(`Turn right to reach ${mapData[target].name}`);
    } else {
        speak(`Turn left to reach ${mapData[target].name}`);
    }
}
    // ---------------- USER ACTION ----------------
    document.body.addEventListener('click', () => {
        if (!synth.speaking) {
            recognition.start();
        }
    });

    document.getElementById('activate-btn').onclick = () => {
        document.getElementById('setup-screen').style.display = 'none';
        speak("System activated");
    };
</script>

</body>
</html>
